<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  font-family: "Montserrat", sans-serif;
  background: linear-gradient(135deg, #020617 0%, #0c1a2e 60%, #020617 100%);
  color: #f1f5f9; position: relative; display: flex; align-items: stretch;
}
.glow {
  position: absolute; width: 500px; height: 500px; border-radius: 50%;
  filter: blur(120px); opacity: 0.08; background: #38bdf8; top: -100px; right: -80px;
}
.left {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  gap: 28px; padding: 60px 60px 100px; position: relative; z-index: 1;
}
.right {
  width: 420px; flex-shrink: 0; position: relative; overflow: hidden;
}
.right-fade {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(to right, #020617 0%, transparent 25%);
}
.mark {
  position: absolute; right: -20px; bottom: -20px;
  font-size: 220px; font-weight: 700; color: #ef4444; line-height: 1; opacity: 0.12; z-index: 1;
}
.eyebrow { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; color: #38bdf8; font-weight: 700; }
.title {
  font-size: 58px; font-weight: 700; line-height: 1.1;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.tags { display: flex; gap: 10px; flex-wrap: wrap; }
.tag {
  font-size: 18px; font-weight: 600; padding: 7px 16px;
  background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2);
  border-radius: 8px; color: #7dd3fc;
}
.logo {
  position: absolute; bottom: 36px; left: 60px; z-index: 2;
  display: flex; align-items: baseline; gap: 2px;
}
.logo-tn { font-size: 22px; font-weight: 700; color: #94a3b8; }
.logo-42 { font-size: 28px; font-weight: 700; color: #ef4444; }
</style></head>
<body>
<div class="glow"></div>
<div class="left">
  <div class="eyebrow">tn42.com · Media</div>
  <div class="title">{caption}</div>
  <div class="tags">{tagsHtml}</div>
</div>
<div class="right">
  <div class="right-fade"></div>
  {mediaHtml}
</div>
<div class="logo"><span class="logo-tn">tn</span><span class="logo-42">42</span></div>
</body></html>
