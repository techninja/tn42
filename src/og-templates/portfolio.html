<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  font-family: "Montserrat", sans-serif;
  background: linear-gradient(135deg, #020617 0%, #0c1a2e 60%, #020617 100%);
  color: #f1f5f9; position: relative; display: flex; align-items: stretch;
}
.glow {
  position: absolute; width: 500px; height: 500px; border-radius: 50%;
  filter: blur(120px); opacity: 0.1; background: #a78bfa; top: -100px; right: -80px;
}
.left {
  width: 560px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center;
  gap: 24px; padding: 60px 40px 90px 70px; position: relative; z-index: 1;
}
.right {
  flex: 1; display: flex; align-items: center;
  justify-content: center; position: relative; z-index: 1;
}
.right img { width: 100%; max-width: 500px; max-height: 500px; object-fit: contain; padding: 40px; }
.mark { font-size: 200px; font-weight: 900; color: #ef4444; line-height: 1; opacity: 0.15; }
.eyebrow { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; color: #38bdf8; font-weight: 700; }
.title { font-size: 70px; font-weight: 800; line-height: 1.0; color: #a78bfa; }
.description { font-size: 23px; color: #94a3b8; line-height: 1.4; }
.logo {
  position: absolute; bottom: 36px; left: 60px; z-index: 2;
  display: flex; align-items: baseline; gap: 2px;
}
.logo-tn { font-size: 22px; font-weight: 800; color: #94a3b8; }
.logo-42 { font-size: 28px; font-weight: 900; color: #ef4444; }
</style></head>
<body>
<div class="glow"></div>
<div class="left">
  <div class="eyebrow">Portfolio · tn42.com</div>
  <div class="title">{name}</div>
  <div class="description">{description}</div>
</div>
<div class="right">
  {logoHtml}
  {noLogoMark}
</div>
<div class="logo"><span class="logo-tn">tn</span><span class="logo-42">42</span></div>
</body></html>
