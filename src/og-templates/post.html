<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  font-family: "Montserrat", Arial, sans-serif;
  background: #020617; color: #f1f5f9; position: relative;
  display: flex; align-items: stretch;
}
.bg-image { position: absolute; top: 0; right: 0; width: 560px; height: 100%; object-fit: cover; }
.bg-fade {
  position: absolute; inset: 0;
  background: linear-gradient(to right, #020617 50%, rgba(2,6,23,0.95) 62%, rgba(2,6,23,0.5) 78%, rgba(2,6,23,0.1) 100%);
}
.content {
  position: relative; z-index: 1; padding: 56px 60px 100px;
  display: flex; flex-direction: column; justify-content: center; gap: 22px; max-width: 760px;
}
.eyebrow { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; color: #38bdf8; font-weight: 700; }
.title { font-size: 60px; font-weight: 800; line-height: 1.05; color: #f1f5f9; }
.tags { display: flex; gap: 10px; flex-wrap: wrap; }
.tag {
  font-size: 16px; font-weight: 600; padding: 5px 14px;
  background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2);
  border-radius: 6px; color: #7dd3fc;
}
.author { display: flex; align-items: center; gap: 14px; }
.avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid #38bdf8; }
.author-meta { display: flex; flex-direction: column; gap: 2px; }
.author-name { font-size: 18px; font-weight: 700; color: #f1f5f9; }
.author-date { font-size: 15px; color: #94a3b8; }
.logo {
  position: absolute; bottom: 36px; left: 60px; z-index: 2;
  display: flex; align-items: baseline; gap: 2px;
}
.logo-tn { font-size: 22px; font-weight: 800; color: #94a3b8; }
.logo-42 { font-size: 28px; font-weight: 800; color: #ef4444; }
</style></head>
<body>
<img class="bg-image" src="{image}">
<div class="bg-fade"></div>
<div class="content">
  <div class="eyebrow">tn42.com</div>
  <div class="title">{postTitle}</div>
  <div class="tags">{tagsHtml}</div>
  <div class="author">
    <img class="avatar" src="/images/picture-1/index.jpg">
    <div class="author-meta">
      <span class="author-name">TechNinja</span>
      <span class="author-date">{dateFormatted}</span>
    </div>
  </div>
</div>
<div class="logo"><span class="logo-tn">tn</span><span class="logo-42">42</span></div>
</body></html>
